server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA fallback — unknown paths serve index.html so client-side
    # routing (react-router, etc.) can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api requests to the backend container.
    # "backend" resolves via Docker Compose's built-in DNS.
    location /api/ {
        proxy_pass         http://backend:5276;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
